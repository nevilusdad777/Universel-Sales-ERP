<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Universal Sales ERP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#004ac6",
                        "secondary": "#545f73",
                        "surface-container-high": "#e7e7f3",
                        "surface-bright": "#faf8ff",
                        "on-primary-container": "#eeefff",
                        "on-surface": "#191b23",
                        "surface-container": "#ededf9",
                        "on-secondary-fixed": "#111c2d",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbcd",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#360f00",
                        "inverse-surface": "#2e3039",
                        "secondary-fixed-dim": "#bcc7de",
                        "secondary-fixed": "#d8e3fb",
                        "primary-fixed-dim": "#b4c5ff",
                        "tertiary": "#943700",
                        "on-surface-variant": "#434655",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-tint": "#0053db",
                        "error": "#ba1a1a",
                        "outline-variant": "#c3c6d7",
                        "surface-variant": "#e1e2ed",
                        "inverse-on-surface": "#f0f0fb",
                        "on-background": "#191b23",
                        "secondary-container": "#d5e0f8",
                        "background": "#faf8ff",
                        "inverse-primary": "#b4c5ff",
                        "tertiary-container": "#bc4800",
                        "surface": "#faf8ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary-fixed": "#00174b",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#586377",
                        "on-secondary-fixed-variant": "#3c475a",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#ffede6",
                        "on-error-container": "#93000a",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-highest": "#e1e2ed",
                        "surface-dim": "#d9d9e5",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#737686",
                        "surface-container-low": "#f3f3fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "gutter": "24px",
                        "xl": "32px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "container-max": "1440px",
                        "2xl": "48px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "display": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"],
                        "h3": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "h1": ["Inter"],
                        "h1-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h3": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "h1": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "h1-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #F8FAFC;
            background-image: radial-gradient(#CBD5E1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #E2E8F0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }
        
        .input-focus-ring:focus {
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md md:p-lg antialiased">
<!-- Main Container -->
<main class="w-full max-w-[420px]">
<!-- Login Card -->
<div class="glass-card rounded-xl p-xl flex flex-col gap-lg">
<!-- Header / Brand -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-sm shadow-sm">
<span class="material-symbols-outlined text-on-primary" style="font-size: 28px; font-variation-settings: 'FILL' 1;">
                        domain
                    </span>
</div>
<h1 class="font-h2 text-h2 text-on-surface">Universal Sales ERP</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your account to continue</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-size: 20px;">
                                mail
                            </span>
</div>
<input class="w-full pl-[36px] pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-0 input-focus-ring transition-all duration-200 font-body-sm text-body-sm text-on-surface" id="email" name="email" placeholder="admin@universalerp.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-size: 20px;">
                                lock
                            </span>
</div>
<input class="w-full pl-[36px] pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-0 input-focus-ring transition-all duration-200 font-body-sm text-body-sm text-on-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm mt-xs">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-surface-container-lowest cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Submit Button -->
<button class="mt-sm w-full h-[40px] bg-[#2563EB] hover:bg-surface-tint text-on-primary rounded font-label-md text-label-md flex items-center justify-center gap-sm transition-colors duration-200 active:scale-[0.98]" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined" style="font-size: 18px;">
                        arrow_forward
                    </span>
</button>
</form>
<!-- Footer / Secondary Action -->
<div class="text-center pt-sm border-t border-surface-variant">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">Contact Administrator</a>
</p>
</div>
</div>
<!-- System Status Banner -->
<div class="mt-lg flex items-center justify-center gap-sm font-body-sm text-body-sm text-on-surface-variant">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
</span>
<span>All systems operational</span>
</div>
</main>
</body></html>
